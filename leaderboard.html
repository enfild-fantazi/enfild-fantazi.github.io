<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enfild Fantazi | Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 900px; text-align: center; }
        .home-btn { 
            position: absolute; top: 20px; left: 20px; 
            padding: 10px 15px; background: #e24a4a; color: white; 
            text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 0.9rem;
        }

        /* Round Tabs Styles */
        .tabs-container { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
        .tab-btn { 
            padding: 8px 16px; border: 1px solid #cbd5e0; background: white; 
            border-radius: 20px; cursor: pointer; transition: 0.2s; font-weight: 600; color: #4a5568;
        }
        .tab-btn:hover { background: #f7fafc; border-color: #a0aec0; }
        .tab-btn.active { background: #2d3748; color: white; border-color: #2d3748; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8fafc; color: #64748b; padding: 15px; border-bottom: 2px solid #edf2f7; text-transform: uppercase; font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; color: #2d3748; }
        tr:hover { background-color: #f1f5f9; cursor: pointer; }
        
        .points { font-weight: bold; color: #2ecc71; }
        .credits { font-weight: bold; color: #2ecc71; }
        .gain-pos { color: #2ecc71; }
        .gain-neg { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="home-btn">Nazad</a>
        <h1>Leaderboard</h1>

        <div id="round-tabs" class="tabs-container">
            <button class="tab-btn active" id="btn-all" onclick="filterLeaderboard('all')">Total</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Username</th>
                    <th>Ime</th>
                    <th id="col-points">Poeni</th>
                    <th id="col-credits">Krediti</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="5">Loading rankings...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://kouvepburiaqlgmgdwla.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_To3N8ID0x-VKZjlgGon-1A_6wpFLmm4';
        const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Global State
        let allTeams = [];
        let allPlayers = [];
        let allHistory = [];
        let allScores = [];
        let manualRound = 1;

        // Banker's Rounding (Round to Even)
        function calculateGain(points, cost) {
            const raw = (points - cost) * 0.1;
            const d = 1; 
            const m = Math.pow(10, d);
            const n = +(raw * m).toFixed(8); 
            const i = Math.floor(n), f = n - i;
            const e = 1e-8;
            const r = (f > 0.5 - e && f < 0.5 + e) ? ((i % 2 === 0) ? i : i + 1) : Math.round(n);
            let finalGain = r / m;
            if (finalGain < 0 && (cost + finalGain) < 4.0) finalGain = -(cost - 4.0);
            return finalGain;
        }

        async function loadData() {
            // 1. Fetch Manual Round Setting
            const { data: setting } = await mySupabase.from('settings').select('value').eq('key', 'current_round').single();
            manualRound = setting ? parseInt(setting.value) : 1;

            // 2. Fetch all data (filtered by current active round)
            const { data: teams } = await mySupabase.from('user_teams').select('*');
            const { data: players } = await mySupabase.from('players').select('id, name');
            const { data: history } = await mySupabase.from('past_teams').select('*');
            const { data: scores } = await mySupabase.from('player_scores').select('*');

            allTeams = teams || [];
            allPlayers = players || [];
            allHistory = history || [];
            allScores = scores || [];

            renderRoundButtons();
            filterLeaderboard('all');
        }

        function renderRoundButtons() {
            const container = document.getElementById('round-tabs');
            // Get unique round numbers from the history data itself
            const roundsInHistory = [...new Set(allHistory.map(h => h.round_number))].sort((a, b) => a - b);
            
            roundsInHistory.forEach(i => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.id = `btn-r-${i}`;
                btn.innerText = `Round ${i}`;
                btn.onclick = () => filterLeaderboard(i);
                container.appendChild(btn);
            });
        }

        function filterLeaderboard(view) {
            // Update UI Tabs
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(view === 'all') document.getElementById('btn-all').classList.add('active');
            else document.getElementById(`btn-r-${view}`).classList.add('active');

            // Update Column Headers
            document.getElementById('col-points').innerText = (view === 'all') ? 'Poeni' : `Poeni`;
            document.getElementById('col-credits').innerText = (view === 'all') ? 'Krediti' : `Gain`;

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            // Process rankings
            const rankings = allTeams
                .filter(user => user.player_ids && user.player_ids.length > 0)
                .map(user => {
                    let points = 0;
                    let creditsDisplay = 0;

                    if (view === 'all') {
                        // Calculate Total Points & Total Credit Gains across all historical rounds
                        let totalGains = 0;
                        const userHistory = allHistory.filter(h => h.user_id === user.user_id);
                        
                        userHistory.forEach(h => {
                            h.player_ids.forEach((pId, idx) => {
                                const score = allScores.find(s => s.player_id == pId && s.round_number == h.round_number);
                                if (score) {
                                    points += score.points;
                                    totalGains += calculateGain(score.points, h.player_costs_at_time[idx]);
                                }
                            });
                        });
                        creditsDisplay = (user.total_credits || 70.0) + totalGains;
                    } else {
                        // Specific Round View
                        const roundSnap = allHistory.find(h => h.user_id == user.user_id && h.round_number == view);
                        if (roundSnap) {
                            roundSnap.player_ids.forEach((pId, idx) => {
                                const score = allScores.find(s => s.player_id == pId && s.round_number == view);
                                if (score) {
                                    points += score.points;
                                    creditsDisplay += calculateGain(score.points, roundSnap.player_costs_at_time[idx]);
                                } else {
                                    // Log this to your browser console (F12) to see if scores are missing
                                    console.log(`No score found for Player ${pId} in Round ${view}`);
                                }
                            });
                        }
                    }

                    // Get Real Name from rep player
                    let realName = "Unknown";
                    if (user.representative_player_id) {
                        const p = allPlayers.find(player => player.id === user.representative_player_id);
                        realName = p ? p.name : "Missing Player";
                    } else {
                        realName = user.temp_name || "Pending...";
                    }

                    return { ...user, realName, points, creditsDisplay };
                });

            // Sort by Points
            rankings.sort((a, b) => b.points - a.points);

            // Render Rows
            rankings.forEach((user, index) => {
                const row = document.createElement('tr');
                row.onclick = () => window.location.href = `timovi.html?id=${user.user_id}&name=${encodeURIComponent(user.username)}`;

                const creditClass = (view === 'all') ? 'credits' : (user.creditsDisplay >= 0 ? 'credits gain-pos' : 'credits gain-neg');
                const creditPrefix = (view !== 'all' && user.creditsDisplay > 0) ? '+' : '';

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${user.username || 'user'}</strong></td>
                    <td>${user.realName}</td>
                    <td class="points">${user.points.toFixed(1)}</td>
                    <td class="${creditClass}">${creditPrefix}${user.creditsDisplay.toFixed(1)}</td>
                `;
                tbody.appendChild(row);
            });
        }

        loadData();
    </script>
</body>
</html>
